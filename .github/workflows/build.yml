name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn package -q

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-registrar
          path: target/repo-registrar-*.jar
          retention-days: 7
